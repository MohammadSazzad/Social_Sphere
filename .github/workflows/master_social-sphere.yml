name: Build & Deploy Full-Stack App to Azure Web App

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # 3. Install & build frontend
      - name: Install and build client
        working-directory: ./Client
        run: |
          npm ci
          npm run build
        # Assumes built files are in ./Client/dist

      # 4. Copy built frontend into backend/public
      - name: Copy client build to backend public folder
        run: |
          rm -rf Backend/public
          mkdir -p Backend/public
          cp -r Client/dist/* Backend/public/

      # 5. Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./Backend
        run: |
          npm ci
          # Optional: add a build step if you compile backend code

      # 6. Azure login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:     ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:     ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 7. Deploy backend (including frontend inside public/) to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name:   social-sphere        # Your Azure Web App name
          slot-name:  Production           # Remove this line if you don't use deployment slots
          package:    ./Backend            # Deploy the Backend folder
